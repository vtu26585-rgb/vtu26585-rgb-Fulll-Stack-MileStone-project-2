<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ticket Booking System</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    .container {
      width: 400px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      width: 95%;
    }

    .error {
      color: red;
      font-size: 12px;
      margin: 0;
    }

    .summary {
      background: #d4edda;
      padding: 15px;
      border-radius: 10px;
      display: none;
      text-align: left;
    }

    hr {
      border: 0;
      border-top: 1px solid #aaa;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🎟 Ticket Booking System</h1>

  <!-- Event Details -->
  <div class="card">
    <h2>📅 Event Details</h2>
    <p><b>Event:</b> Tech Fest 2026</p>
    <p><b>Department:</b> Computer Science</p>
    <p><b>Date:</b> 20 April 2026</p>
    <p><b>Time:</b> 10:00 AM</p>
    <p><b>Venue:</b> Auditorium</p>
    <p><b>Price:</b> ₹100</p>
    <p><b>Available Tickets:</b> <span id="available">50</span></p>
  </div>

  <!-- Booking Form -->
  <div class="card">
    <h2>📝 Book Tickets</h2>

    <form id="bookingForm">

      <input type="text" id="name" placeholder="Name">
      <p class="error" id="nameError"></p>

      <input type="text" id="email" placeholder="Email">
      <p class="error" id="emailError"></p>

      <input type="text" id="department" placeholder="Department">
      <p class="error" id="deptError"></p>

      <input type="number" id="tickets" placeholder="Number of Tickets">
      <p class="error" id="ticketError"></p>

      <button type="submit">Book Now</button>
    </form>
  </div>

  <!-- Summary -->
  <div class="summary" id="summary">
    <h2>✅ Booking Confirmed</h2>
    <hr>
    <p><strong>Name:</strong> <span id="sName"></span></p>
    <p><strong>Event:</strong> <span id="sEvent"></span></p>
    <p><strong>Department:</strong> <span id="sDept"></span></p>
    <p><strong>Tickets:</strong> <span id="sTickets"></span></p>
    <p><strong>Total Amount:</strong> ₹<span id="sAmount"></span></p>
    <p><strong>Remaining Tickets:</strong> <span id="sRemaining"></span></p>
  </div>

</div>

<script>
  let availableTickets = 50;
  const price = 100;

  const form = document.getElementById("bookingForm");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let dept = document.getElementById("department").value.trim();
    let tickets = parseInt(document.getElementById("tickets").value);

    // Clear errors
    document.getElementById("nameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("deptError").innerText = "";
    document.getElementById("ticketError").innerText = "";

    let valid = true;

    // Validation
    if (name === "") {
      document.getElementById("nameError").innerText = "Name is required";
      valid = false;
    }

    if (email === "") {
      document.getElementById("emailError").innerText = "Email required";
      valid = false;
    } else if (!/\S+@\S+\.\S+/.test(email)) {
      document.getElementById("emailError").innerText = "Invalid email";
      valid = false;
    }

    if (dept === "") {
      document.getElementById("deptError").innerText = "Department required";
      valid = false;
    }

    if (!tickets || tickets <= 0) {
      document.getElementById("ticketError").innerText = "Enter valid number";
      valid = false;
    } else if (tickets > availableTickets) {
      document.getElementById("ticketError").innerText = "Not enough tickets";
      valid = false;
    }

    if (!valid) return;

    // Update tickets
    availableTickets -= tickets;
    document.getElementById("available").innerText = availableTickets;

    // Show summary
    document.getElementById("summary").style.display = "block";

    document.getElementById("sName").innerText = name;
    document.getElementById("sEvent").innerText = "Tech Fest 2026";
    document.getElementById("sDept").innerText = dept;
    document.getElementById("sTickets").innerText = tickets;
    document.getElementById("sAmount").innerText = tickets * price;
    document.getElementById("sRemaining").innerText = availableTickets;

    // Success message
    alert("🎉 Booking Successful!");

    form.reset();
  });
</script>

</body>
</html>
